<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atlas Geográfico de Panamá</title>
  <script src="ruffle.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #ffffff; /* opcional */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* ocupa toda la pantalla */
    }

    #flash-container {
      width: 100vw;  /* ocupa todo el ancho */
      height: 100vh; /* ocupa todo el alto */
    }
  </style>
</head>
<body>
  <div id="flash-container"></div>
  <script>
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    document.getElementById("flash-container").appendChild(player);
    player.style.width = "100%";
    player.style.height = "100%";
    player.load("ATLAS FINAL FINAL (1).swf"); // usa el nombre exacto de tu archivo SWF
  </script>
</body>
</html>
